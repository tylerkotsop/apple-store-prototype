<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cart - Apple store - Wealthsimple</title>
    <style>
        @font-face {
            font-family: 'Wealthsimple Sans';
            src: url('Wealthsimple-Sans-Display-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Wealthsimple Sans';
            src: url('Wealthsimple-Sans-Display-Medium.woff') format('woff');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Wealthsimple Sans';
            src: url('Wealthsimple-Sans-Display-Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Wealthsimple Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #2C2C2E;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .phone-container {
            width: 430px;
            max-width: 100%;
            height: 932px;
            background: #000000;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            border-radius: 47px;
            box-shadow: 0 0 0 12px #1C1C1E;
            -webkit-overflow-scrolling: touch;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 50% 0%;
            }
            50% {
                background-position: 100% 50%;
            }
            75% {
                background-position: 50% 100%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes moveLight {
            0%, 100% {
                transform: translate(0%, 0%);
            }
            25% {
                transform: translate(30%, 20%);
            }
            50% {
                transform: translate(10%, 40%);
            }
            75% {
                transform: translate(-20%, 20%);
            }
        }

        .content {
            animation: slideUp 0.4s ease-out 0.1s both;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .phone-container::-webkit-scrollbar {
            display: none;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px 8px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: transparent;
        }

        .status-icons {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        /* Header */
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 37px;
            z-index: 999;
            background: transparent;
            margin-top: -37px;
        }

        .header::after {
            content: '';
            position: absolute;
            top: -37px;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(to bottom,
                rgba(0, 0, 0, 1) 0%,
                rgba(0, 0, 0, 0.95) 40%,
                rgba(0, 0, 0, 0.7) 70%,
                rgba(0, 0, 0, 0) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .back-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(77, 76, 76, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .back-button::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 1px;
            background: linear-gradient(135deg,
                rgba(255, 255, 255, 0.2) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0) 100%);
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .apple-logo {
            width: 20px;
            height: 20px;
            margin-bottom: 4px;
        }

        .header-title {
            font-family: 'Wealthsimple Sans', sans-serif;
            font-size: 17px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .header-subtitle {
            font-family: 'Wealthsimple Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #8E8E93;
        }

        .header-subtitle .amount {
            color: #6DC382;
        }

        .cart-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(77, 76, 76, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .cart-button::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 1px;
            background: linear-gradient(135deg,
                rgba(255, 255, 255, 0.2) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0) 100%);
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Content */
        .content {
            padding: 16px 20px 180px;
            min-height: calc(100% - 160px);
        }

        .products-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 24px;
        }

        /* Product Card */
        .product-card {
            background: #0F0F0F;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 20px;
            position: relative;
        }

        .product-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .product-thumbnail {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .product-thumbnail img {
            height: 55px;
            width: auto;
            object-fit: contain;
        }

        .product-details {
            flex: 1;
            min-width: 0;
        }

        .product-name {
            font-size: 17px;
            font-weight: 500;
            color: #FFFFFF;
            margin-bottom: 4px;
        }

        .product-specs {
            font-size: 15px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
        }

        .product-price {
            display: none;
        }

        .remove-button {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: #FFFFFF;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .remove-button:active {
            background: rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
        }

        .remove-button svg {
            width: 16px;
            height: 16px;
        }


        /* Cost Breakdown */
        .cost-breakdown {
            background: #0F0F0F;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .cost-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .cost-row:last-child {
            margin-bottom: 0;
        }

        .cost-label {
            font-size: 15px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
        }

        .cost-value {
            font-size: 15px;
            font-weight: 500;
            color: #FFFFFF;
        }

        .total-row {
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            margin-top: 4px;
        }

        .total-row .cost-label {
            font-size: 17px;
            font-weight: 700;
            color: #FFFFFF;
        }

        .total-row .cost-value {
            font-size: 17px;
            font-weight: 700;
        }

        .total-row + .cost-row {
            margin-top: 16px;
        }

        /* Fixed Footer */
        .cart-footer {
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            padding-top: 60px;
            background: transparent;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .cart-footer > * {
            pointer-events: auto;
        }

        .checkout-button {
            width: 100%;
            height: 52px;
            background: #FFFFFF;
            border: none;
            border-radius: 26px;
            font-family: 'Wealthsimple Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #000000;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkout-button:active {
            background: rgba(255, 255, 255, 0.9);
        }

        .secondary-button {
            width: 100%;
            height: 52px;
            background: rgba(255, 255, 255, 0.12);
            border: none;
            border-radius: 26px;
            font-family: 'Wealthsimple Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #FFFFFF;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .secondary-button:active {
            background: rgba(255, 255, 255, 0.18);
        }

        .secondary-button.hidden {
            display: none;
        }

        /* Empty State */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 0;
            min-height: 60vh;
            position: relative;
        }

        .empty-state.show {
            display: flex;
            animation: slideUp 0.5s ease-out both;
        }

        .phone-container.empty-cart {
            background: linear-gradient(135deg, #2a2a2a 0%, #0f0f0f 20%, #1f1f1f 40%, #0a0a0a 60%, #252525 80%, #121212 100%);
            background-size: 400% 400%;
            animation: fadeIn 0.3s ease-out, gradientMove 12s ease-in-out infinite;
        }

        .phone-container.empty-cart::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(60, 60, 60, 0.3) 0%, transparent 70%);
            animation: moveLight 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .empty-state-title {
            font-size: 24px;
            font-weight: 400;
            color: #FFFFFF;
            position: relative;
            z-index: 1;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .empty-state-title .muted {
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state-icon {
            width: calc(100% + 40px);
            max-width: calc(100% + 40px);
            height: auto;
            position: relative;
            z-index: 1;
            display: block;
            margin-top: -50px;
            margin-left: -20px;
            margin-right: -20px;
            object-fit: cover;
        }

        .cart-content.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
                <svg width="18" height="12" viewBox="0 0 18 12" fill="none">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M17 0H1C0.447715 0 0 0.447715 0 1V11C0 11.5523 0.447715 12 1 12H17C17.5523 12 18 11.5523 18 11V1C18 0.447715 17.5523 0 17 0ZM1 1V11H17V1H1Z" fill="white"/>
                    <path d="M2 2H16V10H2V2Z" fill="white"/>
                </svg>
                <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
                    <path d="M0.5 5.5C0.5 2.46243 2.96243 0 6 0C9.03757 0 11.5 2.46243 11.5 5.5C11.5 8.53757 9.03757 11 6 11C2.96243 11 0.5 8.53757 0.5 5.5Z" fill="white"/>
                    <path d="M6.5 5.5C6.5 2.46243 8.96243 0 12 0C15.0376 0 17.5 2.46243 17.5 5.5C17.5 8.53757 15.0376 11 12 11C8.96243 11 6.5 8.53757 6.5 5.5Z" fill="white" fill-opacity="0.5"/>
                </svg>
                <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
                    <rect opacity="0.35" x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="white"/>
                    <path opacity="0.4" d="M23 4V8C23.6667 7.66667 24.3333 7.33333 25 7V5C24.3333 4.66667 23.6667 4.33333 23 4Z" fill="white"/>
                    <rect x="2" y="2" width="18" height="8" rx="1.5" fill="white"/>
                </svg>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <a href="iphone-17-pro.html" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M15 18L9 12L15 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>

            <div class="header-center">
                <img src="Apple logo.svg" alt="Apple" class="apple-logo">
                <div class="header-title">Cart</div>
                <div class="header-subtitle">Cash back: <span class="amount">$227.56</span></div>
            </div>

            <div style="width: 40px;"></div>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-state-title"><span class="muted">Your cart is</span> empty.</div>
                <img src="tiers-coins.png" alt="Coins" class="empty-state-icon">
            </div>

            <!-- Cart Content -->
            <div class="cart-content" id="cartContent">
                <!-- Products will be dynamically inserted here -->
                <div class="products-list" id="productsList"></div>

                <!-- Cost Breakdown -->
                <div class="cost-breakdown">
                    <div class="cost-row">
                        <div class="cost-label">Subtotal</div>
                        <div class="cost-value" id="costSubtotal">$1,599.00</div>
                    </div>
                    <div class="cost-row">
                        <div class="cost-label">Shipping</div>
                        <div class="cost-value">Free</div>
                    </div>
                    <div class="cost-row">
                        <div class="cost-label">HST (13%)</div>
                        <div class="cost-value" id="costHST">$207.87</div>
                    </div>
                    <div class="cost-row total-row">
                        <div class="cost-label">Total</div>
                        <div class="cost-value" id="costTotal">$1,806.87</div>
                    </div>
                    <div class="cost-row">
                        <div class="cost-label" style="color: #6DC382;">You'll earn</div>
                        <div class="cost-value" style="color: #6DC382;" id="cartCashback">+$79.95 cash back</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Fixed Footer -->
        <div class="cart-footer">
            <a href="checkout.html" class="checkout-button" id="checkoutButton">Checkout</a>
            <a href="index.html" class="secondary-button" id="secondaryButton">Keep shopping</a>
        </div>
    </div>

    <script>
        // Get cart items from localStorage (array of items)
        let cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
        const checkoutButton = document.getElementById('checkoutButton');
        const secondaryButton = document.getElementById('secondaryButton');
        const emptyState = document.getElementById('emptyState');
        const cartContent = document.getElementById('cartContent');
        const productsList = document.getElementById('productsList');
        const phoneContainer = document.querySelector('.phone-container');

        function renderProducts() {
            productsList.innerHTML = '';

            cartItems.forEach((item, index) => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.innerHTML = `
                    <button class="remove-button" onclick="removeItem(${index})">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <div class="product-row">
                        <div class="product-thumbnail">
                            <img src="${item.productImage}" alt="iPhone">
                        </div>
                        <div class="product-details">
                            <div class="product-name">${item.productName}</div>
                            <div class="product-specs">${item.productSpecs}</div>
                        </div>
                    </div>
                `;
                productsList.appendChild(productCard);
            });
        }

        function updateCartDisplay() {
            if (cartItems.length > 0) {
                // Show cart content
                emptyState.classList.remove('show');
                cartContent.classList.remove('hidden');
                phoneContainer.classList.remove('empty-cart');

                // Update buttons for filled cart
                checkoutButton.textContent = 'Checkout';
                checkoutButton.href = 'checkout.html';
                secondaryButton.classList.remove('hidden');

                // Render all products
                renderProducts();

                // Calculate totals
                const subtotal = cartItems.reduce((sum, item) => sum + item.price, 0);
                const hst = subtotal * 0.13;
                const total = subtotal + hst;

                // Calculate cash back based on amount charged to card after applying available cash back
                const availableCashback = 227.56;
                const amountChargedToCard = Math.max(0, total - availableCashback);
                const totalCashback = parseFloat((amountChargedToCard * 0.05).toFixed(2));

                document.getElementById('costSubtotal').textContent = `$${subtotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                document.getElementById('costHST').textContent = `$${hst.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                document.getElementById('costTotal').textContent = `$${total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                document.getElementById('cartCashback').textContent = `+$${totalCashback.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} cash back`;

                // Update header cash back (use a mock total available balance, in real app would come from API)
                // For now, showing $227.56 as total available
                const headerSubtitle = document.querySelector('.header-subtitle');
                if (headerSubtitle) {
                    headerSubtitle.innerHTML = `Cash back: <span class="amount">$227.56</span>`;
                }

                // Store total for checkout
                localStorage.setItem('checkoutTotal', total.toFixed(2));
                localStorage.setItem('checkoutCashback', totalCashback.toFixed(2));
            } else {
                // Show empty state
                emptyState.classList.add('show');
                cartContent.classList.add('hidden');
                phoneContainer.classList.add('empty-cart');

                // Update buttons for empty cart
                checkoutButton.textContent = 'Keep shopping';
                checkoutButton.href = 'index.html';
                secondaryButton.classList.add('hidden');
            }
        }

        // Remove item function (global so onclick can access it)
        window.removeItem = function(index) {
            cartItems.splice(index, 1);
            localStorage.setItem('cartItems', JSON.stringify(cartItems));

            if (cartItems.length === 0) {
                localStorage.removeItem('cartItems');
                localStorage.removeItem('checkoutTotal');
                localStorage.removeItem('checkoutCashback');
            }

            updateCartDisplay();
        };

        // Initialize display
        updateCartDisplay();
    </script>
</body>
</html>
